services:
  app-staging:
    image: app-staging
    depends_on:
      - db
      - redis
    ports:
      - "3001:3000"
    env_file: "../../.env"
    networks:
      - staging_network

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - staging_network

  db:
    image: postgres:latest
    env_file: "../../.env"
    ports:
      - '5433:5432'
    volumes:
      - postgres_staging_data:/var/lib/postgresql
    networks:
      - staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_staging_data:

networks:
  staging_network:
    name: staging_network
    driver: bridge
