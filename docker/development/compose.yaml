services:
  my-app-development:
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 8.8.4.4
    build:
      context: ../../
      dockerfile: docker/development/Dockerfile
    image: my-app-development
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    env_file: "../../.env.development.sample"
    volumes:
      - ../..:/app # mount local source code into container
    networks:
      - my_network
    command: sh -c "npm install @next/swc-linux-x64-musl --no-save 2>/dev/null; npm run migration:run && npm run dev"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    networks:
      - my_network

  db:
    image: postgres:latest
    env_file: "../../.env.development.sample"
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - my_network


volumes:
  postgres_data:

networks:
  my_network:
    name: my_network
    driver: bridge
