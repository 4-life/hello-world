name: Deploy to production

on:
  push:
    branches:
      - main
      - staging

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/production/Dockerfile -t app .

      - name: Save Docker image
        run: docker save app | gzip > app.tar.gz

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "app.tar.gz,docker/production/compose.yaml"
          target: "/tmp/deploy"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            APP_DIR=$HOME/app
            mkdir -p $APP_DIR

            echo "Creating .env file..."
            cat > $APP_DIR/.env <<EOF
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            CLIENT_ID_GITHUB=${{ secrets.CLIENT_ID_GITHUB }}
            CLIENT_SECRET_GITHUB=${{ secrets.CLIENT_SECRET_GITHUB }}
            CLIENT_ID_GOOGLE=${{ secrets.CLIENT_ID_GOOGLE }}
            CLIENT_SECRET_GOOGLE=${{ secrets.CLIENT_SECRET_GOOGLE }}
            EOF

            echo "Loading image..."
            docker load < /tmp/deploy/app.tar.gz

            cd $APP_DIR

            echo "Starting database..."
            docker compose -f /tmp/deploy/docker/production/compose.yaml up -d db

            echo "Running migrations..."
            docker run --rm --network my_network --env-file $APP_DIR/.env app node app/db/runMigrations.js

            echo "Starting application..."
            docker compose -f /tmp/deploy/docker/production/compose.yaml up -d
